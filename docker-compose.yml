version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: saaspm_postgres
    environment:
      POSTGRES_USER: saaspm_user
      POSTGRES_PASSWORD: saaspm_pass
      POSTGRES_DB: saaspm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: saaspm_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: